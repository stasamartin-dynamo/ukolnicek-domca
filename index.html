<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Domčův Úkolníček</title>
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Domčův Úkolníček">
    <meta name="theme-color" content="#0F0F1A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--bg:#0F0F1A;--bg2:#1A1A2E;--bg3:#252540;--card:#1E1E35;--glass-border:rgba(255,255,255,0.08);--accent:#00D4AA;--accent-glow:rgba(0,212,170,0.15);--accent2:#7C5CFC;--accent2-glow:rgba(124,92,252,0.15);--red:#FF4757;--red-glow:rgba(255,71,87,0.15);--gold:#FFD166;--gold-glow:rgba(255,209,102,0.15);--text:#EEEEF0;--text2:#9999B0;--text3:#5E5E7A}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        /* LOGIN */
        .login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);position:relative;overflow:hidden}
        .login-screen::before{content:'';position:absolute;width:300px;height:300px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);top:10%;left:-10%;pointer-events:none}
        .login-screen::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,var(--accent2-glow) 0%,transparent 70%);bottom:5%;right:-15%;pointer-events:none}
        .login-logo{font-size:56px;margin-bottom:8px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .login-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
        .login-subtitle{font-size:14px;color:var(--text2);margin-bottom:48px}
        .login-buttons{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px;z-index:1}
        .login-btn{display:flex;align-items:center;gap:16px;padding:18px 22px;border:1px solid var(--glass-border);border-radius:16px;font-family:'Inter',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .25s}
        .login-btn:active{transform:scale(.97)}
        .login-btn.child{background:var(--card);color:var(--accent);border-color:rgba(0,212,170,.2)}
        .login-btn.parent{background:var(--card);color:var(--accent2);border-color:rgba(124,92,252,.2)}
        .login-btn .emoji{font-size:28px}
        /* PIN */
        .pin-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
        .pin-back{position:absolute;top:16px;left:16px;background:var(--card);border:1px solid var(--glass-border);border-radius:12px;width:42px;height:42px;font-size:18px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
        .pin-avatar{font-size:52px;margin-bottom:12px}.pin-label{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px}
        .pin-hint{font-size:13px;color:var(--text3);margin-bottom:28px;text-transform:uppercase;letter-spacing:2px;font-weight:600}
        .pin-dots{display:flex;gap:14px;margin-bottom:36px}
        .pin-dot{width:16px;height:16px;border-radius:50%;background:var(--bg3);border:2px solid var(--text3);transition:all .2s}
        .pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow);transform:scale(1.15)}
        .pin-dot.error{background:var(--red);border-color:var(--red);animation:shake .4s}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        .pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;width:100%}
        .pin-key{height:58px;border:1px solid var(--glass-border);border-radius:14px;background:var(--card);font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:600;color:var(--text);cursor:pointer}
        .pin-key:active{transform:scale(.93);background:var(--bg3)}
        .pin-key.empty{background:transparent;border-color:transparent}.pin-key.backspace{font-size:20px;color:var(--text2)}
        /* APP */
        .app{max-width:500px;margin:0 auto;padding:0 16px 40px}
        .header{display:flex;align-items:center;justify-content:space-between;padding:14px 0;position:sticky;top:0;background:rgba(15,15,26,.92);backdrop-filter:blur(16px);z-index:10}
        .header-left{display:flex;align-items:center;gap:10px}
        .header-avatar{font-size:28px}.header-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700}.header-role{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px}
        .logout-btn{background:var(--card);border:1px solid var(--glass-border);border-radius:10px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer}
        /* WALLET */
        .wallet{background:var(--card);border:1px solid var(--glass-border);border-radius:20px;padding:20px 24px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
        .wallet::before{content:'';position:absolute;top:-50%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);pointer-events:none}
        .wallet-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
        .wallet-amount{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:var(--gold)}
        .wallet-currency{font-size:18px;font-weight:600;color:var(--text2);margin-left:4px}
        .wallet-icon{font-size:40px;opacity:.8}
        .deposit-btn{background:var(--gold);color:#0F0F1A;border:none;border-radius:10px;padding:10px;width:100%;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
        .deposit-btn:active{transform:scale(.97)}
        /* DIVIDER */
        .section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--glass-border),transparent);margin:16px 0}
        .section-label{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
        /* WEEK */
        .week-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
        .week-nav-btn{background:var(--card);border:1px solid var(--glass-border);border-radius:10px;width:36px;height:36px;font-size:14px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
        .week-label{font-size:13px;font-weight:600;color:var(--text2)}
        /* TILES */
        .day-tiles{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
        .day-tile{background:var(--card);border:1px solid var(--glass-border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .25s}
        .day-tile:active{transform:scale(.98)}
        .day-tile.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}
        .day-tile.locked:active{transform:none}
        .day-tile.current{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
        .day-tile.completed{border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.05)}
        .day-tile-left{display:flex;align-items:center;gap:12px}
        .day-tile-icon{font-size:24px;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
        .day-tile.current .day-tile-icon{background:var(--accent-glow)}
        .day-tile.completed .day-tile-icon{background:rgba(0,212,170,.15)}
        .day-tile-name{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700}
        .day-tile-date{font-size:11px;color:var(--text3);margin-top:1px}
        .day-tile-right{display:flex;align-items:center;gap:8px}
        .day-tile-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
        .day-tile-badge.done{background:rgba(0,212,170,.15);color:var(--accent)}
        .day-tile-badge.pending{background:var(--gold-glow);color:var(--gold)}
        .day-tile-badge.locked{background:var(--bg3);color:var(--text3)}
        .day-tile-badge.empty{background:var(--bg3);color:var(--text3)}
        .day-tile-arrow{color:var(--text3);font-size:16px}
        .fill-week-btn{background:var(--accent2);color:#fff;border:none;border-radius:12px;padding:12px;width:100%;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px}
        /* BONUS */
        .bonus-card{background:var(--card);border:1px solid rgba(124,92,252,.2);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;transition:all .2s}
        .bonus-card:active{transform:scale(.98)}
        .bonus-card.done{opacity:.5;border-color:rgba(0,212,170,.3)}
        .bonus-left{display:flex;align-items:center;gap:12px}
        .bonus-icon{font-size:22px}
        .bonus-name{font-size:14px;font-weight:600}
        .bonus-price{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--accent2);white-space:nowrap}
        .bonus-check{color:var(--accent);font-size:18px;font-weight:700;margin-left:8px}
        /* GOALS */
        .goal-card{background:var(--card);border:1px solid var(--glass-border);border-radius:16px;padding:16px;margin-bottom:10px;overflow:hidden}
        .goal-top{display:flex;gap:14px;margin-bottom:12px}
        .goal-img{width:80px;height:80px;border-radius:12px;object-fit:cover;flex-shrink:0}
        .goal-info{flex:1}
        .goal-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;margin-bottom:4px}
        .goal-price{font-size:20px;font-weight:700;color:var(--gold);font-family:'Space Grotesk',sans-serif}
        .goal-split{font-size:11px;color:var(--text3);margin-top:4px}
        .goal-split span{font-weight:700}
        .goal-progress-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:6px}
        .goal-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s}
        .goal-progress-label{font-size:11px;color:var(--text2);margin-top:4px;text-align:right}
        /* TASK VIEW */
        .task-view{display:none}.task-view.active{display:block}
        .task-back{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--accent);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;padding:8px 0;margin-bottom:8px}
        .task-day-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;margin-bottom:2px}
        .task-day-date{font-size:12px;color:var(--text3);margin-bottom:12px}
        .tasks-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .tasks-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--text2)}
        .add-task-btn{background:var(--accent);color:#0F0F1A;border:none;border-radius:10px;padding:7px 12px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
        .task-list{display:flex;flex-direction:column;gap:8px}
        .task-card{background:var(--card);border:1px solid var(--glass-border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px}
        .task-card.completed{border-color:rgba(0,212,170,.2);background:rgba(0,212,170,.05)}
        .task-card.rejected{border-color:rgba(255,71,87,.2);background:rgba(255,71,87,.05)}
        .task-checkbox{width:30px;height:30px;border-radius:10px;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0;font-weight:700}
        .task-checkbox.checked{background:var(--accent);border-color:var(--accent);color:#0F0F1A}
        .task-checkbox.approved{background:var(--accent);border-color:var(--accent);color:#0F0F1A}
        .task-checkbox.rejected{background:var(--red);border-color:var(--red);color:#fff}
        .task-info{flex:1}
        .task-name{font-size:13px;font-weight:600}
        .task-note{font-size:11px;color:var(--text2);margin-top:2px;font-style:italic}
        .task-status{font-size:10px;font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
        .task-status.pending{color:var(--gold)}.task-status.approved{color:var(--accent)}.task-status.rejected{color:var(--red)}
        .task-price{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap;margin-left:4px}
        .task-actions{display:flex;gap:4px;flex-shrink:0}
        .task-action-btn{width:32px;height:32px;border:1px solid var(--glass-border);border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;font-weight:700}
        .task-action-btn:active{transform:scale(.9)}
        .task-action-btn.approve{color:var(--accent);border-color:rgba(0,212,170,.3)}
        .task-action-btn.reject{color:var(--red);border-color:rgba(255,71,87,.3)}
        .task-action-btn.delete{color:var(--text3)}.task-action-btn.edit{color:var(--gold)}
        .task-action-btn.reset{color:var(--gold)}
        .empty-state{text-align:center;padding:40px 20px;color:var(--text3)}.empty-state .emoji{font-size:36px;margin-bottom:8px}.empty-state p{font-weight:600;font-size:13px}
        /* MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
        .modal-overlay.active{opacity:1;pointer-events:all}
        .modal{background:var(--bg2);border:1px solid var(--glass-border);border-radius:20px;padding:24px;width:100%;max-width:360px;transform:translateY(20px);transition:transform .2s}
        .modal-overlay.active .modal{transform:translateY(0)}
        .modal-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:14px}
        .modal-input{width:100%;padding:11px 14px;border:2px solid var(--bg3);border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--text);background:var(--bg);margin-bottom:10px;outline:none}
        .modal-input:focus{border-color:var(--accent)}.modal-input::placeholder{color:var(--text3)}
        .modal-textarea{width:100%;padding:11px 14px;border:2px solid var(--bg3);border-radius:12px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--bg);margin-bottom:12px;outline:none;resize:vertical;min-height:60px}
        .modal-textarea:focus{border-color:var(--accent)}.modal-textarea::placeholder{color:var(--text3)}
        .modal-buttons{display:flex;gap:8px}
        .modal-btn{flex:1;padding:11px;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
        .modal-btn.cancel{background:var(--bg3);color:var(--text2)}.modal-btn.confirm{background:var(--accent);color:#0F0F1A}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--glass-border);color:var(--text);padding:12px 22px;border-radius:14px;font-weight:700;font-size:14px;z-index:200;transition:transform .3s;white-space:nowrap}
        .toast.show{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-logo">⚡</div>
    <div class="login-title">Domčův Úkolníček</div>
    <div class="login-subtitle">Vyber svůj profil</div>
    <div class="login-buttons">
        <button class="login-btn child" onclick="showPin('child')"><span class="emoji">👦</span><span>Dominiček</span></button>
        <button class="login-btn parent" onclick="showPin('parent')"><span class="emoji">🔐</span><span>Rodiče</span></button>
    </div>
</div>

<div id="pinScreen" class="pin-screen" style="display:none">
    <button class="pin-back" onclick="showLogin()">←</button>
    <div class="pin-avatar" id="pinAvatar">👦</div>
    <div class="pin-label" id="pinLabel">Dominiček</div>
    <div class="pin-hint">Zadej PIN</div>
    <div class="pin-dots"><div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div><div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div></div>
    <div class="pin-keypad">
        <button class="pin-key" onclick="pressKey('1')">1</button><button class="pin-key" onclick="pressKey('2')">2</button><button class="pin-key" onclick="pressKey('3')">3</button>
        <button class="pin-key" onclick="pressKey('4')">4</button><button class="pin-key" onclick="pressKey('5')">5</button><button class="pin-key" onclick="pressKey('6')">6</button>
        <button class="pin-key" onclick="pressKey('7')">7</button><button class="pin-key" onclick="pressKey('8')">8</button><button class="pin-key" onclick="pressKey('9')">9</button>
        <button class="pin-key empty"></button><button class="pin-key" onclick="pressKey('0')">0</button><button class="pin-key backspace" onclick="pressBackspace()">⌫</button>
    </div>
</div>

<div id="appScreen" style="display:none">
    <div class="app">
        <div class="header"><div class="header-left"><span class="header-avatar" id="appAvatar">👦</span><div><div class="header-name" id="appName">Dominiček</div><div class="header-role" id="appRole">Plnitel úkolů</div></div></div><button class="logout-btn" onclick="showLogin()">Odhlásit</button></div>

        <div class="wallet"><div><div class="wallet-label">Pokladnička</div><div class="wallet-amount" id="walletAmount">0 <span class="wallet-currency">Kč</span></div></div><div class="wallet-icon">💰</div></div>
        <button class="deposit-btn" id="depositBtn" onclick="openDeposit()" style="display:none">💵 Mimořádný vklad do pokladny</button>

        <div id="dayTilesView">
            <div class="section-divider"></div>
            <div class="section-label">📅 Týdenní plán</div>
            <div class="week-nav"><button class="week-nav-btn" onclick="changeWeek(-1)">◀</button><span class="week-label" id="weekLabel">Tento týden</span><button class="week-nav-btn" onclick="changeWeek(1)">▶</button></div>
            <button class="fill-week-btn" id="fillWeekBtn" onclick="fillWeek()" style="display:none">📋 Naplnit týden výchozími úkoly</button>
            <div class="day-tiles" id="dayTiles"></div>

            <div class="section-divider"></div>
            <div class="section-label">⭐ Bonusové úkoly</div>
            <div id="bonusTasks"></div>

            <div class="section-divider"></div>
            <div class="section-label">🎯 Cíle</div>
            <div id="goalsSection"></div>
        </div>

        <div id="taskView" class="task-view">
            <button class="task-back" onclick="backToTiles()">← Zpět na přehled</button>
            <div class="section-divider"></div>
            <div class="task-day-title" id="taskDayTitle">Pondělí</div>
            <div class="task-day-date" id="taskDayDate"></div>
            <div class="section-divider"></div>
            <div class="tasks-header"><div class="tasks-title">Úkoly dne</div><button class="add-task-btn" id="addTaskBtn" onclick="openAddTask()" style="display:none">+ Přidat</button></div>
            <div id="taskList" class="task-list"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="taskModal"><div class="modal"><div class="modal-title" id="modalTitle">Nový úkol</div><input class="modal-input" id="taskInput" type="text" placeholder="Název úkolu..." maxlength="100"><textarea class="modal-textarea" id="taskNote" placeholder="Poznámka (volitelné)..." maxlength="300"></textarea><div class="modal-buttons"><button class="modal-btn cancel" onclick="closeModal()">Zrušit</button><button class="modal-btn confirm" id="modalConfirm" onclick="saveTask()">Přidat</button></div></div></div>
<div class="modal-overlay" id="depositModal"><div class="modal"><div class="modal-title">Mimořádný vklad</div><input class="modal-input" id="depositInput" type="number" placeholder="Částka v Kč..." min="1"><div class="modal-buttons"><button class="modal-btn cancel" onclick="closeDeposit()">Zrušit</button><button class="modal-btn confirm" onclick="doDeposit()">Vložit</button></div></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDftie6EG5OvlpgGxJfWlAAUeszYahMvlQ",authDomain:"ukolnicek-domca.firebaseapp.com",projectId:"ukolnicek-domca",storageBucket:"ukolnicek-domca.firebasestorage.app",messagingSenderId:"959237647252",appId:"1:959237647252:web:8163cdec533e539805bd81"});
var db=firebase.firestore();
var currentRole=null,pinCode='',selectedDay=-1,currentWeekOffset=0,editingTaskId=null;
var unsubscribeWallet=null,unsubscribeAllTasks=null,unsubscribeBonus=null;

function getWeekId(o){var n=new Date(),d=n.getDay(),m=new Date(n);m.setDate(n.getDate()-(d===0?6:d-1)+(o*7));return m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')+'-'+String(m.getDate()).padStart(2,'0')}
function getWeekDates(o){var n=new Date(),d=n.getDay(),m=new Date(n);m.setDate(n.getDate()-(d===0?6:d-1)+(o*7));var r=[];for(var i=0;i<5;i++){var x=new Date(m);x.setDate(m.getDate()+i);r.push(x)}return r}
function getTodayIndex(){var d=new Date().getDay();if(d===0||d===6)return-1;return d-1}
function formatWeekLabel(o){if(o===0)return'Tento týden';if(o===-1)return'Minulý týden';if(o===1)return'Příští týden';var d=getWeekDates(o);return d[0].getDate()+'.'+(d[0].getMonth()+1)+'. – '+d[4].getDate()+'.'+(d[4].getMonth()+1)+'.'}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function showLogin(){if(unsubscribeWallet)unsubscribeWallet();if(unsubscribeAllTasks)unsubscribeAllTasks();if(unsubscribeBonus)unsubscribeBonus();currentRole=null;pinCode='';selectedDay=-1;document.getElementById('loginScreen').style.display='';document.getElementById('pinScreen').style.display='none';document.getElementById('appScreen').style.display='none'}
function showPin(r){currentRole=r;pinCode='';updateDots();document.getElementById('loginScreen').style.display='none';document.getElementById('pinScreen').style.display='';document.getElementById('pinAvatar').textContent=r==='child'?'👦':'🔐';document.getElementById('pinLabel').textContent=r==='child'?'Dominiček':'Rodiče'}
function pressKey(n){if(pinCode.length>=4)return;pinCode+=n;updateDots();if(pinCode.length===4)setTimeout(checkPin,200)}
function pressBackspace(){pinCode=pinCode.slice(0,-1);updateDots()}
function updateDots(){for(var i=0;i<4;i++){document.getElementById('dot'+i).className='pin-dot'+(i<pinCode.length?' filled':'')}}
function checkPin(){if(pinCode===PINS[currentRole])enterApp();else{for(var i=0;i<4;i++)document.getElementById('dot'+i).className='pin-dot filled error';showToast('❌ Špatný PIN!');setTimeout(function(){pinCode='';updateDots()},600)}}

function enterApp(){
    document.getElementById('pinScreen').style.display='none';document.getElementById('appScreen').style.display='';
    var p=currentRole==='parent';
    document.getElementById('appAvatar').textContent=p?'🔐':'👦';
    document.getElementById('appName').textContent=p?'Rodiče':'Dominiček';
    document.getElementById('appRole').textContent=p?'Správce úkolů':'Plnitel úkolů';
    document.getElementById('depositBtn').style.display=p?'':'none';
    currentWeekOffset=0;selectedDay=-1;showTilesView();loadWallet();loadAllWeekTasks();loadBonus();renderGoals();
}
function showTilesView(){document.getElementById('dayTilesView').style.display='';document.getElementById('taskView').className='task-view';selectedDay=-1}
function backToTiles(){showTilesView()}
function changeWeek(d){currentWeekOffset+=d;if(unsubscribeAllTasks)unsubscribeAllTasks();if(unsubscribeBonus)unsubscribeBonus();loadAllWeekTasks();loadBonus()}

function loadWallet(){
    if(unsubscribeWallet)unsubscribeWallet();
    unsubscribeWallet=db.collection('settings').doc('wallet').onSnapshot(function(doc){
        var data=doc.data();var a=data?(data.balance||0):0;
        document.getElementById('walletAmount').innerHTML=a+' <span class="wallet-currency">Kč</span>';
        renderGoals(a);
    });
}

function loadAllWeekTasks(){
    var weekId=getWeekId(currentWeekOffset);
    document.getElementById('weekLabel').textContent=formatWeekLabel(currentWeekOffset);
    if(unsubscribeAllTasks)unsubscribeAllTasks();
    unsubscribeAllTasks=db.collection('weeks').doc(weekId).collection('tasks').onSnapshot(function(snapshot){
        allWeekTasks={};for(var i=0;i<5;i++)allWeekTasks[i]=[];
        snapshot.docs.forEach(function(d){var data=d.data();data.id=d.id;if(data.day>=0&&data.day<5)allWeekTasks[data.day].push(data)});
        for(var i=0;i<5;i++)allWeekTasks[i].sort(function(a,b){return(a.createdAt?a.createdAt.seconds:0)-(b.createdAt?b.createdAt.seconds:0)});
        renderDayTiles();if(selectedDay>=0)renderTasks(allWeekTasks[selectedDay]||[]);
    });
}

function loadBonus(){
    var weekId=getWeekId(currentWeekOffset);
    if(unsubscribeBonus)unsubscribeBonus();
    unsubscribeBonus=db.collection('weeks').doc(weekId).collection('bonus').onSnapshot(function(snapshot){
        bonusTasks=snapshot.docs.map(function(d){var x=d.data();x.id=d.id;return x});
        renderBonus();
    });
}

function getDayStatus(di){
    var tasks=allWeekTasks[di]||[];if(tasks.length===0)return'empty';
    var allApproved=true,hasRejected=false;
    for(var i=0;i<tasks.length;i++){if(tasks[i].approvedByParent===true)continue;if(tasks[i].approvedByParent===false){hasRejected=true;allApproved=false}else allApproved=false}
    if(allApproved&&tasks.length>0)return'done';return'pending';
}

function isCurrentWeek(){return currentWeekOffset===0}

function renderDayTiles(){
    var c=document.getElementById('dayTiles'),dates=getWeekDates(currentWeekOffset),todayIdx=currentWeekOffset===0?getTodayIndex():-1,html='';
    var totalTasks=0;for(var k=0;k<5;k++)totalTasks+=(allWeekTasks[k]||[]).length;
    document.getElementById('fillWeekBtn').style.display=(currentRole==='parent'&&totalTasks===0)?'':'none';
    var unlocked=isCurrentWeek()||currentWeekOffset<0;
    for(var i=0;i<5;i++){
        var status=getDayStatus(i),tasks=allWeekTasks[i]||[],taskCount=tasks.length,doneCount=0;
        for(var j=0;j<tasks.length;j++)if(tasks[j].approvedByParent===true)doneCount++;
        var tc='day-tile';
        if(!unlocked&&currentRole!=='parent')tc+=' locked';
        if(i===todayIdx&&unlocked)tc+=' current';
        if(status==='done')tc+=' completed';
        var badge='';
        if(!unlocked&&currentRole!=='parent')badge='<span class="day-tile-badge locked">🔒</span>';
        else if(status==='done')badge='<span class="day-tile-badge done">✓ Hotovo</span>';
        else if(status==='empty')badge='<span class="day-tile-badge empty">0 úkolů</span>';
        else badge='<span class="day-tile-badge pending">'+doneCount+'/'+taskCount+'</span>';
        var click=(unlocked||currentRole==='parent')?'onclick="openDay('+i+')"':'onclick="showToast('🔒 Příští týden!')"';
        html+='<div class="'+tc+'" '+click+'><div class="day-tile-left"><div class="day-tile-icon">'+DAY_ICONS[i]+'</div><div><div class="day-tile-name">'+DAYS[i]+'</div><div class="day-tile-date">'+dates[i].getDate()+'.'+(dates[i].getMonth()+1)+'.</div></div></div><div class="day-tile-right">'+badge+'<span class="day-tile-arrow">›</span></div></div>';
    }
    c.innerHTML=html;
}

function renderBonus(){
    var c=document.getElementById('bonusTasks'),html='',weekId=getWeekId(currentWeekOffset);
    for(var i=0;i<BONUS_DEFS.length;i++){
        var b=BONUS_DEFS[i],done=false,bid=null,approved=null;
        for(var j=0;j<bonusTasks.length;j++){
            if(bonusTasks[j].name===b.name){done=bonusTasks[j].completedByChild;bid=bonusTasks[j].id;approved=bonusTasks[j].approvedByParent;break}
        }
        var cls='bonus-card'+(approved===true?' done':'');
        var checkHtml=approved===true?'<span class="bonus-check">✓</span>':'';
        var clickAttr='';
        if(currentRole!=='parent'&&!done&&approved===null)clickAttr='onclick="toggleBonus(''+b.name+'','+b.price+',true)"';
        else if(currentRole==='parent'&&done&&approved===null)clickAttr='onclick="approveBonus(''+bid+'',true,'+b.price+')"';
        html+='<div class="'+cls+'" '+clickAttr+'><div class="bonus-left"><span class="bonus-icon">'+b.icon+'</span><span class="bonus-name">'+b.name+(done&&approved===null?' ⏳':'')+'</span></div><div style="display:flex;align-items:center"><span class="bonus-price">+'+b.price+' Kč</span>'+checkHtml+'</div></div>';
    }
    c.innerHTML=html;
}

function toggleBonus(name,price,val){
    var weekId=getWeekId(currentWeekOffset);
    var existing=null;
    for(var i=0;i<bonusTasks.length;i++){if(bonusTasks[i].name===name){existing=bonusTasks[i];break}}
    if(!existing){
        db.collection('weeks').doc(weekId).collection('bonus').add({name:name,price:price,completedByChild:true,approvedByParent:null,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        showToast('💪 Bonusový úkol označen!');
    }
}

function approveBonus(id,approved,price){
    var weekId=getWeekId(currentWeekOffset);
    db.collection('weeks').doc(weekId).collection('bonus').doc(id).update({approvedByParent:approved});
    if(approved){
        db.collection('settings').doc('wallet').get().then(function(d){
            var b=d.exists?(d.data().balance||0):0;
            db.collection('settings').doc('wallet').set({balance:b+price});
        });
        showToast('✅ Bonus schválen! +'+price+' Kč');
    }
}

function renderGoals(balance){
    if(typeof balance==='undefined'){
        var el=document.getElementById('walletAmount');
        balance=parseInt(el.textContent)||0;
    }
    var c=document.getElementById('goalsSection'),html='';
    for(var i=0;i<GOALS.length;i++){
        var g=GOALS[i];
        var pct=Math.min(100,Math.round(balance/g.child*100));
        html+='<div class="goal-card"><div class="goal-top"><img class="goal-img" src="'+g.img+'"><div class="goal-info"><div class="goal-name">'+g.name+'</div><div class="goal-price">'+g.price.toLocaleString('cs')+' Kč</div><div class="goal-split"><span>Domča:</span> '+g.child.toLocaleString('cs')+' Kč · <span>Rodiče:</span> '+g.parent.toLocaleString('cs')+' Kč</div></div></div><div class="goal-progress-bg"><div class="goal-progress-fill" style="width:'+pct+'%"></div></div><div class="goal-progress-label">'+Math.min(balance,g.child).toLocaleString('cs')+' / '+g.child.toLocaleString('cs')+' Kč ('+pct+'%)</div></div>';
    }
    c.innerHTML=html;
}

function openDay(di){
    selectedDay=di;var dates=getWeekDates(currentWeekOffset);
    document.getElementById('dayTilesView').style.display='none';document.getElementById('taskView').className='task-view active';
    document.getElementById('taskDayTitle').textContent=DAY_ICONS[di]+' '+DAYS[di];
    document.getElementById('taskDayDate').textContent=dates[di].getDate()+'.'+(dates[di].getMonth()+1)+'.'+dates[di].getFullYear();
    document.getElementById('addTaskBtn').style.display=currentRole==='parent'?'':'none';
    renderTasks(allWeekTasks[di]||[]);
}

function renderTasks(tasks){
    var c=document.getElementById('taskList'),ip=currentRole==='parent';
    if(!tasks.length){c.innerHTML='<div class="empty-state"><div class="emoji">'+(ip?'📝':'⚡')+'</div><p>'+(ip?'Přidej úkoly!':'Žádné úkoly!')+'</p></div>';return}
    var h='';
    for(var i=0;i<tasks.length;i++){
        var t=tasks[i],cc='',ci='',st='',sc='',ca='';
        if(t.approvedByParent===true){cc='approved';ci='✓';st='✅ Schváleno';sc='approved';ca='completed'}
        else if(t.approvedByParent===false){cc='rejected';ci='✗';st='❌ Nesplněno';sc='rejected';ca='rejected'}
        else if(t.completedByChild){cc='checked';ci='✓';st='⏳ Čeká na schválení';sc='pending'}
        else{st='○ Nesplněno';sc='pending'}
        var noteHtml=t.note?'<div class="task-note">'+escapeHtml(t.note)+'</div>':'';
        var priceColor=t.approvedByParent===true?'var(--accent)':t.approvedByParent===false?'var(--red)':'var(--gold)';
        var priceText=t.approvedByParent===true?'+5 Kč':t.approvedByParent===false?'-5 Kč':'5 Kč';
        var ac='';
        if(ip){
            if(t.completedByChild&&t.approvedByParent===null)ac+='<button class="task-action-btn approve" onclick="approveTask(''+t.id+'',true)">✓</button><button class="task-action-btn reject" onclick="approveTask(''+t.id+'',false)">✗</button>';
            if(t.approvedByParent!==null)ac+='<button class="task-action-btn reset" onclick="resetTask(''+t.id+'','+t.approvedByParent+')">↩</button>';
            ac+='<button class="task-action-btn edit" onclick="openEditTask(''+t.id+'')">✎</button>';
            ac+='<button class="task-action-btn delete" onclick="deleteTask(''+t.id+'')">🗑</button>';
        }
        var ck='';if(!ip&&t.approvedByParent===null)ck='onclick="toggleComplete(''+t.id+'','+(!t.completedByChild)+')"';
        h+='<div class="task-card '+ca+'"><div class="task-checkbox '+cc+'" '+ck+'>'+ci+'</div><div class="task-info"><div class="task-name">'+escapeHtml(t.name)+'</div>'+noteHtml+'<div class="task-status '+sc+'">'+st+'</div></div><span class="task-price" style="color:'+priceColor+'">'+priceText+'</span><div class="task-actions">'+ac+'</div></div>';
    }
    c.innerHTML=h;
}

function openAddTask(){editingTaskId=null;document.getElementById('modalTitle').textContent='Nový úkol';document.getElementById('modalConfirm').textContent='Přidat';document.getElementById('taskInput').value='';document.getElementById('taskNote').value='';document.getElementById('taskModal').classList.add('active');setTimeout(function(){document.getElementById('taskInput').focus()},200)}
function openEditTask(id){
    var tasks=allWeekTasks[selectedDay]||[],task=null;
    for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){task=tasks[i];break}}
    if(!task)return;editingTaskId=id;
    document.getElementById('modalTitle').textContent='Upravit úkol';document.getElementById('modalConfirm').textContent='Uložit';
    document.getElementById('taskInput').value=task.name;document.getElementById('taskNote').value=task.note||'';
    document.getElementById('taskModal').classList.add('active');setTimeout(function(){document.getElementById('taskInput').focus()},200);
}
function closeModal(){document.getElementById('taskModal').classList.remove('active');editingTaskId=null}
function saveTask(){
    var name=document.getElementById('taskInput').value.trim();if(!name)return;
    var note=document.getElementById('taskNote').value.trim(),weekId=getWeekId(currentWeekOffset);
    if(editingTaskId){db.collection('weeks').doc(weekId).collection('tasks').doc(editingTaskId).update({name:name,note:note});closeModal();showToast('✏️ Upraveno!')}
    else{db.collection('weeks').doc(weekId).collection('tasks').add({name:name,note:note,day:selectedDay,completedByChild:false,approvedByParent:null,createdAt:firebase.firestore.FieldValue.serverTimestamp()});closeModal();showToast('✅ Přidáno!')}
}
function toggleComplete(id,v){db.collection('weeks').doc(getWeekId(currentWeekOffset)).collection('tasks').doc(id).update({completedByChild:v});showToast(v?'💪 Řekni rodičům!':'↩️ Zrušeno')}
function approveTask(id,a){
    db.collection('weeks').doc(getWeekId(currentWeekOffset)).collection('tasks').doc(id).update({approvedByParent:a});
    db.collection('settings').doc('wallet').get().then(function(d){var b=d.exists?(d.data().balance||0):0;db.collection('settings').doc('wallet').set({balance:a?b+5:b-5})});
    showToast(a?'✅ +5 Kč':'❌ −5 Kč');
}
function resetTask(id,was){
    db.collection('weeks').doc(getWeekId(currentWeekOffset)).collection('tasks').doc(id).update({approvedByParent:null,completedByChild:false});
    db.collection('settings').doc('wallet').get().then(function(d){var b=d.exists?(d.data().balance||0):0;db.collection('settings').doc('wallet').set({balance:was?b-5:b+5})});
    showToast('↩️ Vráceno');
}
function deleteTask(id){
    if(!confirm('Smazat?'))return;
    var tasks=allWeekTasks[selectedDay]||[],task=null;for(var i=0;i<tasks.length;i++){if(tasks[i].id===id){task=tasks[i];break}}
    if(task&&task.approvedByParent!==null){db.collection('settings').doc('wallet').get().then(function(d){var b=d.exists?(d.data().balance||0):0;db.collection('settings').doc('wallet').set({balance:task.approvedByParent?b-5:b+5})})}
    db.collection('weeks').doc(getWeekId(currentWeekOffset)).collection('tasks').doc(id).delete();showToast('🗑 Smazáno');
}
function fillWeek(){
    if(!confirm('Naplnit týden?'))return;var weekId=getWeekId(currentWeekOffset),batch=db.batch();
    for(var day=0;day<5;day++){for(var t=0;t<DEFAULT_TASKS.length;t++){var ref=db.collection('weeks').doc(weekId).collection('tasks').doc();batch.set(ref,{name:DEFAULT_TASKS[t],note:'',day:day,completedByChild:false,approvedByParent:null,createdAt:firebase.firestore.Timestamp.now()})}}
    batch.commit().then(function(){showToast('📋 Naplněno!')});
}
function openDeposit(){document.getElementById('depositModal').classList.add('active');document.getElementById('depositInput').value='';setTimeout(function(){document.getElementById('depositInput').focus()},200)}
function closeDeposit(){document.getElementById('depositModal').classList.remove('active')}
function doDeposit(){
    var val=parseInt(document.getElementById('depositInput').value);if(!val||val<1)return;
    db.collection('settings').doc('wallet').get().then(function(d){
        var b=d.exists?(d.data().balance||0):0;
        db.collection('settings').doc('wallet').set({balance:b+val});
    });
    closeDeposit();showToast('💵 Vloženo '+val+' Kč!');
}
db.collection('settings').doc('wallet').get().then(function(d){if(!d.exists)db.collection('settings').doc('wallet').set({balance:0})});
</script>
