<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Domčův Úkolníček</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FFF8F0;
            --card: #FFFFFF;
            --primary: #FF6B35;
            --primary-light: #FF8F62;
            --success: #2EC4B6;
            --success-light: #E8FAF8;
            --danger: #E71D36;
            --danger-light: #FDE8EB;
            --warning: #FFD166;
            --purple: #7B61FF;
            --text: #2D2A32;
            --text-light: #8A8691;
            --border: #F0ECE6;
            --shadow: 0 4px 20px rgba(45, 42, 50, 0.08);
            --shadow-lg: 0 8px 40px rgba(45, 42, 50, 0.12);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== LOGIN SCREEN ===== */
        .login-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 50%, #FFDDC1 100%);
        }

        .login-logo {
            font-size: 72px;
            margin-bottom: 10px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .login-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .login-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 320px;
        }

        .login-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border: none;
            border-radius: 20px;
            font-family: 'Nunito', sans-serif;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .login-btn:active { transform: scale(0.97); }

        .login-btn.child {
            background: linear-gradient(135deg, var(--success), #20A99A);
            color: white;
        }

        .login-btn.parent {
            background: linear-gradient(135deg, var(--purple), #6248E0);
            color: white;
        }

        .login-btn .emoji {
            font-size: 36px;
        }

        /* ===== PIN SCREEN ===== */
        .pin-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 100%);
        }

        .pin-back {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-avatar {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .pin-label {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .pin-hint {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 24px;
        }

        .pin-dots {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .pin-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.2s;
        }

        .pin-dot.filled {
            background: var(--primary);
            transform: scale(1.2);
        }

        .pin-dot.error {
            background: var(--danger);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .pin-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 280px;
            width: 100%;
        }

        .pin-key {
            height: 64px;
            border: none;
            border-radius: 16px;
            background: white;
            font-family: 'Nunito', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.15s;
        }

        .pin-key:active {
            transform: scale(0.93);
            background: var(--border);
        }

        .pin-key.empty { background: transparent; box-shadow: none; cursor: default; }
        .pin-key.backspace { font-size: 22px; }

        /* ===== MAIN APP ===== */
        .app {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 16px 100px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-avatar {
            font-size: 32px;
        }

        .header-name {
            font-size: 18px;
            font-weight: 800;
        }

        .header-role {
            font-size: 12px;
            color: var(--text-light);
            font-weight: 600;
        }

        .logout-btn {
            background: white;
            border: none;
            border-radius: 12px;
            padding: 8px 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        /* Wallet */
        .wallet {
            background: linear-gradient(135deg, var(--primary), #E85D2A);
            border-radius: 24px;
            padding: 24px;
            color: white;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .wallet::after {
            content: '💰';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 56px;
            opacity: 0.3;
        }

        .wallet-label {
            font-size: 14px;
            font-weight: 600;
            opacity: 0.9;
        }

        .wallet-amount {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
        }

        .wallet-currency {
            font-size: 24px;
            font-weight: 700;
        }

        /* Day Tabs */
        .day-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .day-tab {
            flex-shrink: 0;
            padding: 10px 16px;
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: white;
            color: var(--text-light);
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .day-tab.active {
            background: var(--primary);
            color: white;
        }

        .day-tab.today {
            border: 2px solid var(--primary);
        }

        /* Tasks */
        .tasks-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .tasks-title {
            font-size: 20px;
            font-weight: 800;
        }

        .add-task-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 8px 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-card {
            background: white;
            border-radius: 18px;
            padding: 16px 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
        }

        .task-card.completed { background: var(--success-light); }
        .task-card.rejected { background: var(--danger-light); }

        .task-checkbox {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .task-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .task-checkbox.approved {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .task-checkbox.rejected {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-size: 16px;
            font-weight: 700;
        }

        .task-status {
            font-size: 12px;
            font-weight: 600;
            margin-top: 2px;
        }

        .task-status.pending { color: var(--warning); }
        .task-status.done { color: var(--success); }
        .task-status.approved { color: var(--success); }
        .task-status.rejected { color: var(--danger); }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-action-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .task-action-btn:active { transform: scale(0.9); }

        .task-action-btn.approve {
            background: var(--success-light);
            color: var(--success);
        }

        .task-action-btn.reject {
            background: var(--danger-light);
            color: var(--danger);
        }

        .task-action-btn.delete {
            background: #f5f0eb;
            color: var(--text-light);
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
        }

        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-weight: 600; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow-lg);
            transform: translateY(20px);
            transition: transform 0.2s;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            border: 3px solid var(--border);
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-input:focus {
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .modal-btn.cancel {
            background: var(--border);
            color: var(--text-light);
        }

        .modal-btn.confirm {
            background: var(--primary);
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 15px;
            z-index: 200;
            transition: transform 0.3s;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Week navigation */
        .week-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .week-nav-btn {
            background: white;
            border: none;
            border-radius: 12px;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .week-label {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-light);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-logo">📋</div>
    <div class="login-title">Domčův Úkolníček</div>
    <div class="login-subtitle">Kdo se přihlašuje?</div>
    <div class="login-buttons">
        <button class="login-btn child" onclick="showPin('child')">
            <span class="emoji">👦</span>
            <span>Dominiček</span>
        </button>
        <button class="login-btn parent" onclick="showPin('parent')">
            <span class="emoji">👨‍👩‍👦</span>
            <span>Rodiče</span>
        </button>
    </div>
</div>

<!-- PIN SCREEN -->
<div id="pinScreen" class="pin-screen" style="display:none;">
    <button class="pin-back" onclick="showLogin()">←</button>
    <div class="pin-avatar" id="pinAvatar">👦</div>
    <div class="pin-label" id="pinLabel">Dominiček</div>
    <div class="pin-hint">Zadej PIN</div>
    <div class="pin-dots">
        <div class="pin-dot" id="dot0"></div>
        <div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div>
        <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-keypad">
        <button class="pin-key" onclick="pressKey('1')">1</button>
        <button class="pin-key" onclick="pressKey('2')">2</button>
        <button class="pin-key" onclick="pressKey('3')">3</button>
        <button class="pin-key" onclick="pressKey('4')">4</button>
        <button class="pin-key" onclick="pressKey('5')">5</button>
        <button class="pin-key" onclick="pressKey('6')">6</button>
        <button class="pin-key" onclick="pressKey('7')">7</button>
        <button class="pin-key" onclick="pressKey('8')">8</button>
        <button class="pin-key" onclick="pressKey('9')">9</button>
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pressKey('0')">0</button>
        <button class="pin-key backspace" onclick="pressBackspace()">⌫</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" style="display:none;">
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <span class="header-avatar" id="appAvatar">👦</span>
                <div>
                    <div class="header-name" id="appName">Dominiček</div>
                    <div class="header-role" id="appRole">Plnitel úkolů</div>
                </div>
            </div>
            <button class="logout-btn" onclick="showLogin()">Odhlásit</button>
        </div>

        <!-- Wallet -->
        <div class="wallet">
            <div class="wallet-label">Pokladnička</div>
            <div class="wallet-amount" id="walletAmount">0 <span class="wallet-currency">Kč</span></div>
        </div>

        <!-- Week Navigation -->
        <div class="week-nav">
            <button class="week-nav-btn" onclick="changeWeek(-1)">◀</button>
            <span class="week-label" id="weekLabel">Tento týden</span>
            <button class="week-nav-btn" onclick="changeWeek(1)">▶</button>
        </div>

        <!-- Day Tabs -->
        <div class="day-tabs" id="dayTabs"></div>

        <!-- Tasks -->
        <div class="tasks-header">
            <div class="tasks-title" id="tasksTitle">Úkoly</div>
            <button class="add-task-btn" id="addTaskBtn" onclick="openAddTask()" style="display:none;">
                + Přidat
            </button>
        </div>

        <div id="taskList" class="task-list"></div>
    </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="addTaskModal">
    <div class="modal">
        <div class="modal-title">Nový úkol</div>
        <input class="modal-input" id="taskInput" type="text" placeholder="Název úkolu..." maxlength="100">
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeModal()">Zrušit</button>
            <button class="modal-btn confirm" onclick="addTask()">Přidat</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    // ===== FIREBASE INIT =====
    firebase.initializeApp({
        apiKey: "AIzaSyDftie6EG5OvlpgGxJfWlAAUeszYahMvlQ",
        authDomain: "ukolnicek-domca.firebaseapp.com",
        projectId: "ukolnicek-domca",
        storageBucket: "ukolnicek-domca.firebasestorage.app",
        messagingSenderId: "959237647252",
        appId: "1:959237647252:web:8163cdec533e539805bd81"
    });

    const db = firebase.firestore();

    // ===== STATE =====
    let currentRole = null; // 'child' or 'parent'
    let pinCode = '';
    let selectedDay = 0;
    let currentWeekOffset = 0;
    let unsubscribeTasks = null;
    let unsubscribeWallet = null;

    const PINS = { child: '1234', parent: '3385' };
    const DAYS = ['Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
    const DAYS_SHORT = ['Po', 'Út', 'St', 'Čt', 'Pá', 'So'];

    // ===== HELPERS =====
    function getWeekId(offset = 0) {
        const now = new Date();
        const day = now.getDay();
        const monday = new Date(now);
        monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
        const y = monday.getFullYear();
        const m = String(monday.getMonth() + 1).padStart(2, '0');
        const d = String(monday.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function getWeekDates(offset = 0) {
        const now = new Date();
        const day = now.getDay();
        const monday = new Date(now);
        monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + (offset * 7));
        const dates = [];
        for (let i = 0; i < 6; i++) {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            dates.push(d);
        }
        return dates;
    }

    function getTodayIndex() {
        const d = new Date().getDay();
        if (d === 0) return -1; // neděle
        return d - 1; // 0=po, 1=út, ...5=so
    }

    function formatWeekLabel(offset) {
        if (offset === 0) return 'Tento týden';
        if (offset === -1) return 'Minulý týden';
        if (offset === 1) return 'Příští týden';
        const dates = getWeekDates(offset);
        const from = dates[0];
        const to = dates[5];
        return `${from.getDate()}.${from.getMonth()+1}. – ${to.getDate()}.${to.getMonth()+1}.`;
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== LOGIN / PIN =====
    function showLogin() {
        if (unsubscribeTasks) unsubscribeTasks();
        if (unsubscribeWallet) unsubscribeWallet();
        currentRole = null;
        pinCode = '';
        document.getElementById('loginScreen').style.display = '';
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'none';
    }

    function showPin(role) {
        currentRole = role;
        pinCode = '';
        updateDots();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('pinScreen').style.display = '';
        document.getElementById('pinAvatar').textContent = role === 'child' ? '👦' : '👨‍👩‍👦';
        document.getElementById('pinLabel').textContent = role === 'child' ? 'Dominiček' : 'Rodiče';
    }

    function pressKey(num) {
        if (pinCode.length >= 4) return;
        pinCode += num;
        updateDots();
        if (pinCode.length === 4) {
            setTimeout(checkPin, 200);
        }
    }

    function pressBackspace() {
        pinCode = pinCode.slice(0, -1);
        updateDots();
    }

    function updateDots() {
        for (let i = 0; i < 4; i++) {
            const dot = document.getElementById(`dot${i}`);
            dot.className = 'pin-dot' + (i < pinCode.length ? ' filled' : '');
        }
    }

    function checkPin() {
        if (pinCode === PINS[currentRole]) {
            enterApp();
        } else {
            // Error animation
            for (let i = 0; i < 4; i++) {
                document.getElementById(`dot${i}`).className = 'pin-dot filled error';
            }
            showToast('❌ Špatný PIN!');
            setTimeout(() => {
                pinCode = '';
                updateDots();
            }, 600);
        }
    }

    // ===== MAIN APP =====
    function enterApp() {
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = '';

        const isParent = currentRole === 'parent';
        document.getElementById('appAvatar').textContent = isParent ? '👨‍👩‍👦' : '👦';
        document.getElementById('appName').textContent = isParent ? 'Rodiče' : 'Dominiček';
        document.getElementById('appRole').textContent = isParent ? 'Správce úkolů' : 'Plnitel úkolů';
        document.getElementById('addTaskBtn').style.display = isParent ? '' : 'none';

        currentWeekOffset = 0;
        const todayIdx = getTodayIndex();
        selectedDay = todayIdx >= 0 && todayIdx <= 5 ? todayIdx : 0;

        renderDayTabs();
        loadData();
    }

    function changeWeek(dir) {
        currentWeekOffset += dir;
        selectedDay = 0;
        document.getElementById('weekLabel').textContent = formatWeekLabel(currentWeekOffset);
        renderDayTabs();
        loadData();
    }

    function renderDayTabs() {
        const container = document.getElementById('dayTabs');
        const dates = getWeekDates(currentWeekOffset);
        const todayIdx = currentWeekOffset === 0 ? getTodayIndex() : -1;

        container.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const btn = document.createElement('button');
            btn.className = 'day-tab' + (i === selectedDay ? ' active' : '') + (i === todayIdx ? ' today' : '');
            btn.textContent = `${DAYS_SHORT[i]} ${dates[i].getDate()}.${dates[i].getMonth()+1}.`;
            btn.onclick = () => { selectedDay = i; renderDayTabs(); loadData(); };
            container.appendChild(btn);
        }
        document.getElementById('weekLabel').textContent = formatWeekLabel(currentWeekOffset);
        document.getElementById('tasksTitle').textContent = DAYS[selectedDay];
    }

    // ===== DATA =====
    function loadData() {
        const weekId = getWeekId(currentWeekOffset);

        // Listen to tasks
        if (unsubscribeTasks) unsubscribeTasks();
        unsubscribeTasks = db.collection('weeks').doc(weekId).collection('tasks')
            .where('day', '==', selectedDay)
            .orderBy('createdAt', 'asc')
            .onSnapshot(snapshot => {
                renderTasks(snapshot.docs.map(d => ({ id: d.id, ...d.data() })));
            }, err => {
                console.error('Tasks error:', err);
                document.getElementById('taskList').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><p>Chyba načítání</p></div>';
            });

        // Listen to wallet
        if (unsubscribeWallet) unsubscribeWallet();
        unsubscribeWallet = db.collection('settings').doc('wallet')
            .onSnapshot(doc => {
                const data = doc.data();
                const amount = data ? (data.balance || 0) : 0;
                document.getElementById('walletAmount').innerHTML = `${amount} <span class="wallet-currency">Kč</span>`;
            });
    }

    function renderTasks(tasks) {
        const container = document.getElementById('taskList');
        const isParent = currentRole === 'parent';

        if (tasks.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">${isParent ? '📝' : '🎉'}</div>
                    <p>${isParent ? 'Zatím žádné úkoly. Přidej nějaký!' : 'Na tento den nejsou žádné úkoly!'}</p>
                </div>`;
            return;
        }

        container.innerHTML = tasks.map(task => {
            let checkClass = '';
            let checkIcon = '';
            let statusText = '';
            let statusClass = '';
            let cardClass = '';

            if (task.approvedByParent === true) {
                checkClass = 'approved';
                checkIcon = '✓';
                statusText = '✅ Schváleno (+5 Kč)';
                statusClass = 'approved';
                cardClass = 'completed';
            } else if (task.approvedByParent === false) {
                checkClass = 'rejected';
                checkIcon = '✗';
                statusText = '❌ Nesplněno (−5 Kč)';
                statusClass = 'rejected';
                cardClass = 'rejected';
            } else if (task.completedByChild) {
                checkClass = 'checked';
                checkIcon = '✓';
                statusText = '⏳ Čeká na schválení rodiče';
                statusClass = 'pending';
            } else {
                statusText = '○ Nesplněno';
                statusClass = 'pending';
            }

            // Actions
            let actions = '';
            if (isParent && task.completedByChild && task.approvedByParent === null) {
                actions = `
                    <div class="task-actions">
                        <button class="task-action-btn approve" onclick="approveTask('${task.id}', true)" title="Schválit">✓</button>
                        <button class="task-action-btn reject" onclick="approveTask('${task.id}', false)" title="Nesplněno">✗</button>
                    </div>`;
            }
            if (isParent && task.approvedByParent === null && !task.completedByChild) {
                actions += `<button class="task-action-btn delete" onclick="deleteTask('${task.id}')" title="Smazat">🗑</button>`;
            }

            // Child can toggle completion only if not yet approved/rejected
            let checkClick = '';
            if (!isParent && task.approvedByParent === null) {
                checkClick = `onclick="toggleComplete('${task.id}', ${!task.completedByChild})"`;
            }

            return `
                <div class="task-card ${cardClass}">
                    <div class="task-checkbox ${checkClass}" ${checkClick}>${checkIcon}</div>
                    <div class="task-info">
                        <div class="task-name">${escapeHtml(task.name)}</div>
                        <div class="task-status ${statusClass}">${statusText}</div>
                    </div>
                    ${actions}
                </div>`;
        }).join('');
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ===== TASK ACTIONS =====
    function openAddTask() {
        document.getElementById('addTaskModal').classList.add('active');
        document.getElementById('taskInput').value = '';
        setTimeout(() => document.getElementById('taskInput').focus(), 200);
    }

    function closeModal() {
        document.getElementById('addTaskModal').classList.remove('active');
    }

    async function addTask() {
        const name = document.getElementById('taskInput').value.trim();
        if (!name) return;

        const weekId = getWeekId(currentWeekOffset);
        await db.collection('weeks').doc(weekId).collection('tasks').add({
            name: name,
            day: selectedDay,
            completedByChild: false,
            approvedByParent: null,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        closeModal();
        showToast('✅ Úkol přidán!');
    }

    async function toggleComplete(taskId, completed) {
        const weekId = getWeekId(currentWeekOffset);
        await db.collection('weeks').doc(weekId).collection('tasks').doc(taskId).update({
            completedByChild: completed
        });
        showToast(completed ? '💪 Super, tak to řekni rodičům!' : '↩️ Označení zrušeno');
    }

    async function approveTask(taskId, approved) {
        const weekId = getWeekId(currentWeekOffset);

        // Update task
        await db.collection('weeks').doc(weekId).collection('tasks').doc(taskId).update({
            approvedByParent: approved
        });

        // Update wallet
        const walletRef = db.collection('settings').doc('wallet');
        const walletDoc = await walletRef.get();
        const currentBalance = walletDoc.exists ? (walletDoc.data().balance || 0) : 0;
        const newBalance = approved ? currentBalance + 5 : currentBalance - 5;

        await walletRef.set({ balance: newBalance });

        showToast(approved ? '✅ Schváleno! +5 Kč pro Domču!' : '❌ Nesplněno. −5 Kč.');
    }

    async function deleteTask(taskId) {
        if (!confirm('Opravdu smazat tento úkol?')) return;
        const weekId = getWeekId(currentWeekOffset);
        await db.collection('weeks').doc(weekId).collection('tasks').doc(taskId).delete();
        showToast('🗑 Úkol smazán');
    }

    // ===== INIT =====
    // Init wallet if needed
    db.collection('settings').doc('wallet').get().then(doc => {
        if (!doc.exists) {
            db.collection('settings').doc('wallet').set({ balance: 0 });
        }
    });
</script>
</body>
</html>
